services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alumnos_db
    ports:
      - "3306:3306"
    volumes:
      - ./alumnos_db.sql:/docker-entrypoint-initdb.d/alumnos_db.sql
